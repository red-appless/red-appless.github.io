<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLB順位予想 2026</title>
    <link rel="icon" type="image/svg+xml" href="https://www.mlbstatic.com/team-logos/league/1.svg">
    <style>
        /* 無印良品風デザイン・ガイドライン */
        :root {
            --muji-bg: #F6F5F1;       /* 柔らかな生成り色 */
            --muji-text: #333333;     /* 墨色 */
            --muji-red: #7F0019;      /* エンジ（MUJIレッド） */
            --muji-border: #D1D1D1;   /* 繊細な境界線 */
            --muji-white: #FFFFFF;
        }

        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--muji-bg); 
            margin: 0; 
            padding: 0; 
            color: var(--muji-text); 
            line-height: 1.8;
            -webkit-text-size-adjust: 100%; 
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* タイトル・ヘッダー */
        header { 
            text-align: center; 
            padding: 60px 0 40px; 
            border-bottom: 1px solid var(--muji-border);
            margin-bottom: 40px;
        }
        h1 { font-size: 1.4rem; font-weight: 500; letter-spacing: 0.15em; margin: 0; }
        h2 { font-size: 1.1rem; font-weight: 500; margin: 40px 0 20px; border-left: 3px solid var(--muji-red); padding-left: 15px; text-align: left; }
        h3 { font-size: 1rem; font-weight: 500; margin: 0 0 15px; border-bottom: 1px solid var(--muji-border); padding-bottom: 8px; }
        
        .update-info { font-size: 0.75rem; color: #888; margin-top: 15px; }
        .update-btn { 
            background: none; border: 1px solid var(--muji-border); color: var(--muji-text); 
            padding: 8px 24px; cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        .update-btn:hover { background: var(--muji-text); color: var(--muji-white); }

        /* 総合順位：横幅2/3・中央合わせ */
        .score-section {
            width: 100%;
            margin-bottom: 60px;
        }
        #scoreTable {
            width: 66.66%; /* 3分の2 */
            margin: 0 auto; /* 中央合わせ */
            background-color: transparent;
        }

        /* テーブル共通 */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 12px 8px; border-bottom: 1px solid var(--muji-border); text-align: center; }
        th { font-weight: 500; color: #777; font-size: 0.8rem; }
        
        .col-rank { width: 40px; }
        .col-user { width: 60px; }

        .clickable-name { text-decoration: none; color: var(--muji-text); border-bottom: 1px solid var(--muji-border); cursor: pointer; }
        .score-total { font-weight: bold; color: var(--muji-red); }

        .team-cell { display: flex; align-items: center; gap: 8px; text-align: left; }
        .team-logo { width: 20px; height: 20px; filter: grayscale(20%); } /* 馴染むよう少し彩度を落とす */

        /* 地区ごとのカードレイアウト */
        .division-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .card { background: transparent; padding: 0; margin-bottom: 20px; }

        /* 個別プレイヤーページ */
        .back-btn { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 0.85rem; }
        .player-header { text-align: center; padding: 40px 0; border-bottom: 1px solid var(--muji-border); margin-bottom: 40px; }
        #detailPlayerName { font-size: 1.8rem; font-weight: 400; letter-spacing: 0.2em; }

        .prediction-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--muji-border); }
        .rank-badge { width: 40px; font-weight: 500; }

        /* モバイル対応（既存の仕様を維持） */
        @media (max-width: 600px) {
            #scoreTable { width: 90%; } /* モバイルでは読みやすさ優先で少し広げる */
            .division-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.2rem; }
        }

        /* PC対応（2カラム） */
        @media (min-width: 800px) {
            .division-grid { grid-template-columns: repeat(2, 1fr); gap: 60px 40px; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="topPage">
            <header>
                <h1>MLB 順位予想 2026</h1>
                <div class="update-info">
                    <button id="updateButton" class="update-btn">データを更新する</button>
                    <p>最終更新：<span id="lastUpdated">-</span></p>
                </div>
            </header>

            <section class="score-section">
                <h2>総合順位</h2>
                <table id="scoreTable">
                    <thead><tr><th class="col-rank">位</th><th>名前</th><th>反転数</th></tr></thead>
                    <tbody></tbody>
                </table>
            </section>

            <h2>地区別状況</h2>
            <div id="divisionsContainer" class="division-grid"></div>
        </div>

        <div id="playerPage" class="hidden">
            <a href="#" class="back-btn" onclick="location.hash=''; return false;">← 戻る</a>
            <div class="player-header">
                <h1 id="detailPlayerName"></h1>
                <p style="font-size: 0.8rem; color: #888; letter-spacing: 0.1em;">PREDICTIONS</p>
            </div>
            <div id="playerPredictionsGrid" class="division-grid"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyO5_oG_IAp8whEPVHdSLKiP945F-fCb9uPymUo6hm3ZNu93-rqZKpQj-bfv7diGcXZ/exec";
        let globalData = null;
        const getLogo = (id) => `https://www.mlbstatic.com/team-logos/${id}.svg`;

        async function loadData() {
            try {
                const res = await fetch('./data.json?' + Date.now());
                globalData = await res.json();
                renderTopPage();
                handleRouting();
            } catch (e) { document.getElementById('lastUpdated').innerText = "取得失敗"; }
        }

        function renderTopPage() {
            document.getElementById('lastUpdated').innerText = globalData.last_updated;
            const scoreBody = document.querySelector('#scoreTable tbody');
            scoreBody.innerHTML = Object.entries(globalData.scores)
                .sort((a, b) => a[1] - b[1])
                .map(([name, score], i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td><span class="clickable-name" onclick="location.hash='${encodeURIComponent(name)}'">${name}</span></td>
                        <td class="score-total">${score}</td>
                    </tr>`).join('');

            const divContainer = document.getElementById('divisionsContainer');
            divContainer.innerHTML = globalData.divisions.map(div => `
                <div class="card">
                    <h3>${div.name}</h3>
                    <table>
                        <thead>
                            <tr>
                                <th class="col-rank">実</th>
                                <th>チーム</th>
                                <th class="col-user">井口</th>
                                <th class="col-user">細川</th>
                                <th class="col-user">田中</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${div.teams.map(t => `
                                <tr>
                                    <td>${t.actual_rank}</td>
                                    <td>
                                        <div class="team-cell">
                                            <img class="team-logo" src="${getLogo(t.id)}" onerror="this.style.display='none'">
                                            <span>${t.name}</span>
                                        </div>
                                    </td>
                                    <td>${t.predictions["井口健介"]}</td>
                                    <td>${t.predictions["細川峻平"]}</td>
                                    <td>${t.predictions["田中雄太郎"]}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function renderPlayerDetail(playerName) {
            document.getElementById('topPage').classList.add('hidden');
            document.getElementById('playerPage').classList.remove('hidden');
            document.getElementById('detailPlayerName').innerText = playerName;
            const grid = document.getElementById('playerPredictionsGrid');
            grid.innerHTML = globalData.divisions.map(div => {
                const sortedTeams = [...div.teams].sort((a, b) => (a.predictions[playerName] || 99) - (b.predictions[playerName] || 99));
                return `<div class="card">
                    <h3>${div.name}</h3>
                    ${sortedTeams.map(t => `
                        <div class="prediction-row">
                            <div class="rank-badge">${t.predictions[playerName]}</div>
                            <img class="team-logo" style="width:24px; height:24px; margin-right:15px;" src="${getLogo(t.id)}">
                            <div style="flex-grow:1;">
                                <div style="font-size:0.95rem;">${t.name}</div>
                                <div style="font-size:0.75rem; color:#999">現在：${t.actual_rank}位</div>
                            </div>
                        </div>`).join('')}
                </div>`;
            }).join('');
        }

        function handleRouting() {
            const hash = decodeURIComponent(location.hash.replace('#', ''));
            if (hash && globalData && globalData.scores[hash] !== undefined) {
                renderPlayerDetail(hash);
                window.scrollTo(0, 0);
            } else {
                document.getElementById('topPage').classList.remove('hidden');
                document.getElementById('playerPage').classList.add('hidden');
            }
        }

        window.onhashchange = handleRouting;
        document.getElementById('updateButton').onclick = async () => {
            if(!confirm("データを更新しますか？")) return;
            try { await fetch(GAS_URL, { method: 'POST', mode: 'no-cors' }); alert("更新を依頼しました。"); } catch (e) { alert("エラーが発生しました。"); }
        };
        loadData();
    </script>
</body>
</html>
