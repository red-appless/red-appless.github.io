<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLB 順位予想 2026</title>
    <link rel="icon" type="image/svg+xml" href="content/image_2.png">
    <style>
        :root {
            --mlb-blue: #002D72;
            --mlb-red: #E31937;
            --bg-gray: #f0f3f5;
            --text-main: #222;
        }

        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
        }

        /* ヘッダー画像エリア（2枚目の写真を使用） */
        .hero-header {
            position: relative;
            width: 100%;
            height: 280px;
            background: url('content/image.png') no-repeat center center;
            background-size: cover;
        }

        /* 霧がかった白のカバーと下部へのグラデーション */
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, 
                rgba(255, 255, 255, 0.8) 0%, 
                rgba(255, 255, 255, 0.3) 40%, 
                rgba(255, 255, 255, 0.1) 75%, 
                var(--bg-gray) 100%
            );
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto 40px; 
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        /* タイトルエリア（画像に少し被せる） */
        .title-section {
            text-align: center;
            margin-top: -180px; /* 位置をさらに上へ調整 */
            margin-bottom: 30px;
        }

        h1 { 
            color: #ffffff;
            /* 縁取りではなく、文字の背面を少し暗くして浮かせる自然なシャドウ */
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3); 
            font-size: 2.8rem;
            font-weight: 700; /* 900だと漢字が潰れやすいため700に変更 */
            letter-spacing: 0.1em; /* 漢字の密度を下げるための文字間隔 */
            margin: 0 0 20px 0;
            /* MLBらしい、よりクリーンなフォント指定 */
            font-family: 'Avenir Next', 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        .update-box {
            font-size: 0.75rem;
            color: #333;
            /* 背景を透過させ、少しすりガラス風にして「浮かない」ように馴染ませる */
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px); 
            display: inline-flex;
            align-items: center;
            padding: 6px 18px;
            border-radius: 20px;
        }

        .update-btn { 
            background-color: var(--mlb-red); 
            color: white; 
            border: none; 
            padding: 5px 12px; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-left: 8px;
        }
        
        /* カードデザイン */
        .card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            overflow: hidden;
        }

        .card-header-blue {
            background: var(--mlb-blue);
            color: white;
            padding: 15px;
            text-align: center;
        }

        h2 { 
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        h3 { 
            color: var(--mlb-blue); 
            font-size: 1.1rem; 
            margin: 0;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        /* 総合順位テーブル */
        .score-table-wrapper {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        #scoreTable { width: 100%; border-collapse: collapse; }
        #scoreTable th { color: #888; font-size: 0.8rem; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        #scoreTable td { padding: 15px 10px; border-bottom: 1px solid #f9f9f9; text-align: center; font-size: 1.1rem; }
        
        .rank-num { font-weight: bold; color: #aaa; width: 40px; }
        .clickable-name { color: var(--mlb-blue); text-decoration: underline; cursor: pointer; font-weight: bold; }
        .score-total { font-weight: 800; color: var(--mlb-red); font-size: 1.5rem !important; }

        /* ディビジョンテーブル */
        .division-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .division-table { width: 100%; border-collapse: collapse; }
        .division-table th { background: var(--mlb-blue); color: white; padding: 10px 5px; font-size: 0.75rem; }
        .division-table td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; }

        .team-cell { display: flex; align-items: center; gap: 8px; text-align: left; padding-left: 10px; }
        .team-logo { width: 22px; height: 22px; }
        .team-name-text { font-weight: 600; }

        /* プレイヤー詳細ページ専用 */
        /* プレイヤー詳細ページ専用のヘッダー修正 */
        .detail-header {
            background: linear-gradient(135deg, var(--mlb-blue) 0%, #004ba0 100%);
            color: white;
            /* パディングを 40px から 20px 程度に縮小 */
            padding: 20px; 
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        /* プレイヤー名のサイズを小さく調整 */
        #detailPlayerName {
            color: white;
            margin: 0;
            /* 2.5rem から 1.5rem 前後に縮小 */
            font-size: 1.6rem; 
            letter-spacing: 0.05em;
        }

        /* PREDICTIONSの文字もバランスを見て微調整 */
        .detail-header p {
            letter-spacing: 2px;
            opacity: 0.8;
            margin: 5px 0 0 0;
            font-size: 0.7rem;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .division-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="hero-header"><div class="hero-overlay"></div></div>

    <div class="container">
        <div id="topPage">
            <div class="title-section">
                <h1>MLB 順位予想 2026</h1>
                <div class="update-box">
                    最新データに準拠｜更新: <span id="lastUpdated">-</span>
                    <button id="updateButton" class="update-btn">更新リクエスト</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header-blue">
                    <h2>🏆 総合順位</h2>
                </div>
                <div class="score-table-wrapper">
                    <table id="scoreTable">
                        <thead>
                            <tr>
                                <th>位</th>
                                <th>プレイヤー</th>
                                <th>反転数</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="divisionsContainer" class="division-grid"></div>
        </div>

        <div id="playerPage" class="hidden">
            <div style="padding: 10px 0 20px 0;">
                <a href="#" style="color:var(--mlb-blue); font-weight:bold; text-decoration:none; display: flex; align-items: center; gap: 5px;" onclick="location.hash=''; return false;">
                    <span>◀</span> 全体の順位に戻る
                </a>
            </div>
            <div class="detail-header">
                <h1 id="detailPlayerName"></h1>
                <p id="playerDescription">Predictions</p>
            </div>
            </div>
            <div id="playerPredictionsGrid" class="division-grid"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyO5_oG_IAp8whEPVHdSLKiP945F-fCb9uPymUo6hm3ZNu93-rqZKpQj-bfv7diGcXZ/exec";
        let globalData = null;
        const getLogo = (id) => `https://www.mlbstatic.com/team-logos/${id}.svg`;

        async function loadData() {
            try {
                // 本番環境では ./data.json を読み込み
                const res = await fetch('./data.json?' + Date.now());
                globalData = await res.json();
                renderTopPage();
                handleRouting();
            } catch (e) { 
                console.error("データ読み込み失敗", e);
                document.getElementById('lastUpdated').innerText = "エラー"; 
            }
        }

        function renderTopPage() {
            document.getElementById('lastUpdated').innerText = globalData.last_updated;
            const scoreBody = document.querySelector('#scoreTable tbody');
            
            scoreBody.innerHTML = Object.entries(globalData.scores)
                .sort((a, b) => a[1] - b[1])
                .map(([name, score], i) => `
                    <tr>
                        <td class="rank-num">${i+1}</td>
                        <td><span class="clickable-name" onclick="location.hash='${encodeURIComponent(name)}'">${name}</span></td>
                        <td class="score-total">${score}</td>
                    </tr>`).join('');

            const divContainer = document.getElementById('divisionsContainer');
            divContainer.innerHTML = globalData.divisions.map(div => `
                <div class="card">
                    <h3>${div.name}</h3>
                    <table class="division-table">
                        <thead>
                            <tr>
                                <th style="width:30px">順位</th>
                                <th>チーム</th>
                                <th style="width:50px">細川</th>
                                <th style="width:50px">井口</th>
                                <th style="width:50px">田中</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${div.teams.map(t => `
                                <tr>
                                    <td style="font-weight:bold; color:#999;">${t.actual_rank}</td>
                                    <td>
                                        <div class="team-cell">
                                            <img class="team-logo" src="${getLogo(t.id)}" onerror="this.src='https://www.mlbstatic.com/team-logos/league/1.svg'">
                                            <span class="team-name-text">${t.name}</span>
                                        </div>
                                    </td>
                                    <td style="background:#fcfcfc">${t.predictions["細川峻平"]}</td>
                                    <td>${t.predictions["井口健介"]}</td>
                                    <td style="background:#fcfcfc">${t.predictions["田中雄太郎"]}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function renderPlayerDetail(playerName) {
            document.getElementById('topPage').classList.add('hidden');
            document.getElementById('playerPage').classList.remove('hidden');
            document.getElementById('detailPlayerName').innerText = playerName;

                const descriptions = {
                    "細川峻平": "全米を震撼させる、狂気の大当たり",
                    "井口健介": "理論が導く、必然の当選確実",
                    "田中雄太郎": "ロマンと理性が織りなす、幸福な当たりクジ"
                };
                document.getElementById('playerDescription').innerText = descriptions[playerName] || "Predictions";
    
            
            const grid = document.getElementById('playerPredictionsGrid');
            grid.innerHTML = globalData.divisions.map(div => {
                const sortedTeams = [...div.teams].sort((a, b) => (a.predictions[playerName] || 99) - (b.predictions[playerName] || 99));
                return `<div class="card">
                    <h3>${div.name}</h3>
                    <div style="padding: 10px;">
                    ${sortedTeams.map(t => `
                        <div style="display:flex; align-items:center; padding:12px; border-bottom:1px solid #eee;">
                            <div style="width:30px; font-weight:800; font-size:1.4rem; color:var(--mlb-blue); text-align:center;">${t.predictions[playerName]}</div>
                            <img src="${getLogo(t.id)}" style="width:28px; margin:0 15px;">
                            <div style="font-size:0.75rem; color:#888;">現:${t.actual_rank}位</div>
                        </div>`).join('')}
                    </div>
                </div>`;
            }).join('');
            window.scrollTo(0,0);
        }

        function handleRouting() {
            const hash = decodeURIComponent(location.hash.replace('#', ''));
            if (hash && globalData && globalData.scores[hash] !== undefined) {
                renderPlayerDetail(hash);
            } else {
                document.getElementById('topPage').classList.remove('hidden');
                document.getElementById('playerPage').classList.add('hidden');
            }
        }

        window.onhashchange = handleRouting;
        
        document.getElementById('updateButton').onclick = async () => {
            if(!confirm("最新データを取得しますか？")) return;
            try { 
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors' }); 
                alert("リクエストを送信しました。"); 
            } catch (e) { 
                alert("エラーが発生しました。"); 
            }
        };

        loadData();
    </script>
</body>
</html>
